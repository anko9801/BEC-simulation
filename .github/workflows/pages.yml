name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/eu151/density_64.html"
      - "examples/eu151/density_64.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp examples/eu151/density_64.html _site/index.html
          cp examples/eu151/density_64.json _site/density_64.json

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4

# ================================================================
# Eu151 adiabatic magnetic field ramp
# ================================================================
#
# Poster experiment (II): slowly ramp B from finite value to near
# zero. Spins adiabatically follow the local dipolar magnetic field.
# Resulting spin texture differs from EdH (dynamic formation).
#
# Protocol (poster):
#   1 G  -->  1 mG   over  50 ms  (linear ramp)
#   1 mG -->  68 uG  over 200 ms  (slow ramp, adiabatic)
#   hold at 68 uG for observation
#
# Dimensionless values assume omega_perp = 2pi x 100 Hz.
# See eu151_edh.yaml header for conversion formulae.
# ================================================================

experiment:
  name: "Eu151 adiabatic ramp (2D)"

  system:
    atom: Eu151
    grid:
      n_points: [64, 64]
      box_size: [20.0, 20.0]
    interactions:
      c0: 378.0
      c1: 0.0
    ddi:
      enabled: true
      c_dd: 49.0

  ground_state:
    dt: 0.005
    n_steps: 20000
    tol: 1.0e-10
    initial_state: ferromagnetic
    zeeman:
      p: 100.0
      q: 0.0
    potential:
      type: harmonic
      omega: [1.0, 1.0]

  sequence:
    # ---- Phase 1: Ramp from high field to moderate ----
    # 1 G -> 1 mG over 50 ms = 31.4 omega^{-1}
    # Adiabatic: atoms stay in m = +6 throughout
    - name: ramp_high_to_moderate
      duration: 31.4
      dt: 0.005
      save_every: 200
      zeeman:
        p:
          from: 5000.0
          to: 50.0
        q: 0.0

    # ---- Phase 2: Slow ramp to near-zero ----
    # 1 mG -> 68 uG over 200 ms = 125.7 omega^{-1}
    # Spins should adiabatically follow local dipolar field
    - name: ramp_moderate_to_low
      duration: 125.7
      dt: 0.005
      save_every: 500
      zeeman:
        p:
          from: 50.0
          to: 3.0
        q: 0.0

    # ---- Phase 3: Hold and observe ----
    # 5 ms = 3.14 omega^{-1}
    - name: hold
      duration: 3.14
      dt: 0.001
      save_every: 50
      zeeman:
        p: 3.0
        q: 0.0

# ================================================================
# Eu151 adiabatic magnetic field ramp (3D)
# ================================================================
#
# Reference:
#   Matsui et al., Science 391, 384-388 (2026)
#   arXiv:2504.17357
#
# Protocol: slowly ramp B from finite value toward weak field.
# Spins adiabatically follow the local dipolar magnetic field.
# Resulting spin texture differs from EdH (dynamic formation).
#
# See eu151_edh.yaml header for unit conventions and parameter values.
#
# Dimensionless: ℏ = m = ω_ref = 1, ω_ref = 2π × 110 Hz
#   1 ms ≈ 0.691 ω⁻¹
#   p = g_F μ_B B / (ℏ ω_ref)
# ================================================================

experiment:
  name: "Eu151 adiabatic ramp (3D)"

  system:
    atom: Eu151
    grid:
      n_points: [64, 64, 64]
      box_size: [20.0, 20.0, 20.0]
    interactions:
      c_total: 4689.0
      c1_ratio: 0.02778  # 1/36, Buchachenko AFM estimate
    ddi:
      enabled: true
      c_dd: 7647.0

  ground_state:
    dt: 0.005
    n_steps: 20000
    tol: 1.0e-10
    initial_state: ferromagnetic
    zeeman:
      p: 100.0
      q: 0.0
    potential:
      type: harmonic
      omega: [1.0, 1.0, 1.182]

  sequence:
    # ---- Phase 1: Ramp from high field to moderate ----
    # 1 G → 1 mG over 50 ms ≈ 34.6 ω⁻¹
    # p(1G) ≈ 150000, p(1mG) ≈ 150
    - name: ramp_high_to_moderate
      duration: 34.6
      dt: 0.005
      save_every: 200
      zeeman:
        p:
          from: 5000.0
          to: 150.0
        q: 0.0

    # ---- Phase 2: Slow ramp to near weak field ----
    # 1 mG → 68 μG over 200 ms ≈ 138.2 ω⁻¹
    # p(68μG) ≈ 10
    - name: ramp_moderate_to_low
      duration: 138.2
      dt: 0.005
      save_every: 500
      zeeman:
        p:
          from: 150.0
          to: 10.0
        q: 0.0

    # ---- Phase 3: Hold and observe ----
    # 5 ms ≈ 3.5 ω⁻¹
    - name: hold
      duration: 3.5
      dt: 0.001
      save_every: 50
      zeeman:
        p: 10.0
        q: 0.0
